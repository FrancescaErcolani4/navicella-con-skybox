events { 
    worker_connections 1024; 
}

http {
    # Include i tipi MIME standard del sistema (copre css, html, js, png, jpg, ecc.)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Estendiamo i tipi MIME solo per quello che manca nello standard, senza sovrascrivere
    types {
        text/plain                            obj mtl;
        # Se in futuro userai modelli più ottimizzati, questi ti salvano la vita:
        application/json                      gltf;
        application/octet-stream              glb;
    }

    server {
        # Configurato direttamente sulla porta 80 standard di Nginx, allineata con Railway
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            
            # Consigliato per WebGL: evita che il browser si tenga in cache 
            # vecchie versioni dei modelli 3D o del codice JS mentre fai i test
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}